<div class="row">
    <div class="col-sm-12">
        <mat-card class="example-card bg-dark p-3" appearance="outlined">
            <mat-card-header class="d-flex justify-content-center">
                <h2 class="text-warning mb-3">Student Form</h2>
            </mat-card-header>
            <form [formGroup]="myStudentForm" (ngSubmit)="CreateStudent()">
                <mat-card-content>
                    <mat-form-field class="w-100">
                        <mat-label>Full Name</mat-label>
                        <input matInput aria-label="Enter Your FullName...." formControlName="fullName">
                    </mat-form-field>
                    <mat-form-field class="w-100">
                        <mat-label>Image</mat-label>
                        <input matInput aria-label="Enter Your Image Urls...." formControlName="image">
                    </mat-form-field>
                    <mat-form-field class="w-100">
                        <mat-label>Contact Number</mat-label>
                        <input matInput aria-label="Enter Your Contact Number...." formControlName="contactNumber">
                    </mat-form-field>
                    <mat-form-field class="w-100">
                        <mat-label>Email Address</mat-label>
                        <input matInput aria-label="Enter Your Email Address...." formControlName="email">
                    </mat-form-field>
                </mat-card-content>
                <mat-card-actions class="d-flex justify-content-between">
                    <button type="submit" mat-flat-button color="primary">{{myEditStudentData() ? 'Update Student' :
                        'Create Student'}}</button>
                    <button type="button" mat-flat-button>Go To Sign In</button>
                </mat-card-actions>
            </form>
        </mat-card>

    </div>
</div>

<!-- table -->

<div class="row my-4">
    <div class="col-sm-12">
        <div class="table-responsive">
            <table mat-table [dataSource]="dataStudentSource()" class="mat-elevation-z8 demo-table bg-dark">
                <!-- Serial Number Column -->
                <ng-container matColumnDef="srNo">
                    <th mat-header-cell *matHeaderCellDef> Sr. No. </th>
                    <td mat-cell *matCellDef="let element; let i = index">
                        {{ i + 1 }}
                    </td>
                </ng-container>

                <!-- Id No Column -->
                <ng-container matColumnDef="id">
                    <th mat-header-cell *matHeaderCellDef> Id No. </th>
                    <td mat-cell *matCellDef="let element"> {{element.id || 'N/A'}} </td>
                </ng-container>

                <!-- Full Name Column -->
                <ng-container matColumnDef="fullName">
                    <th mat-header-cell *matHeaderCellDef> full Name </th>
                    <td mat-cell *matCellDef="let element"> {{element.fullName | firstLetterCaptialize}} </td>
                </ng-container>

                <!-- Image Column -->
                <ng-container matColumnDef="image">
                    <th mat-header-cell *matHeaderCellDef> Image </th>
                    <td mat-cell *matCellDef="let element"> <img [src]="element.image" alt=""> </td>
                </ng-container>

                <!-- Contact Number Column -->
                <ng-container matColumnDef="contactNumber">
                    <th mat-header-cell *matHeaderCellDef> Contact Number </th>
                    <td mat-cell *matCellDef="let element"> {{element.contactNumber}} </td>
                </ng-container>

                <!-- Email Address Column -->

                <ng-container matColumnDef="email">
                    <th mat-header-cell *matHeaderCellDef> Email Address </th>
                    <td mat-cell *matCellDef="let element"> {{element.email}} </td>
                </ng-container>

                <!-- Action Button -->
                <ng-container matColumnDef="action">
                    <th mat-header-cell *matHeaderCellDef> Action </th>
                    <td mat-cell *matCellDef="let element">
                        <button class="btn btn-outline-danger btn-sm" aria-label="delete"
                            (click)="onDeleteStudent(element)"><i class="fa-solid fa-delete-left"></i></button>
                        <button class="btn btn-outline-info btn-sm ms-3" aria-label="editing"
                            (click)="onUpdateStudent(element)"><i class="fa-solid fa-pencil"></i></button>
                    </td>
                </ng-container>

                <tr mat-header-row *matHeaderRowDef="displayStudentColumn"></tr>
                <tr mat-row *matRowDef="let row; columns: displayStudentColumn;"></tr>
            </table>
        </div>
    </div>
</div>
